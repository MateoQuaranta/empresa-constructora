<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" role="img" aria-label="Empresa Constructora">
  <!-- Icono: bloques geométricos estilizados -->
  <g>
    <!-- Bloque base izquierdo -->
    <rect x="4" y="30" width="14" height="22" fill="#143C64"/>
    <!-- Bloque central alto -->
    <rect x="20" y="14" width="14" height="38" fill="#143C64"/>
    <!-- Bloque derecho medio -->
    <rect x="36" y="22" width="14" height="30" fill="#143C64"/>
    <!-- Línea base -->
    <rect x="4" y="52" width="46" height="2" fill="#143C64"/>
  </g>
  <!-- Texto -->
  <text x="62" y="24" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#143C64" text-anchor="start">EMPRESA</text>
  <text x="62" y="42" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" letter-spacing="3.5" fill="#2D2D2D" text-anchor="start">CONSTRUCTORA</text>
</svg>
